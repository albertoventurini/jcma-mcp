name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach assets to"
        required: true

permissions:
  contents: write          # gh release upload writes assets onto the release

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: jcma-linux-amd64
          - os: macos-latest
            asset: jcma-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}    # build from the tagged commit, not the default branch
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'
      - name: Build native image
        run: ./gradlew nativeCompile --no-daemon
      - name: Package binary
        run: |
          cp build/native/nativeCompile/jcma jcma
          tar -czf ${{ matrix.asset }}.tar.gz jcma
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" ${{ matrix.asset }}.tar.gz --clobber

  # JVM fallback — `bin/jcma` (POSIX) + `bin/jcma.bat` (Windows) + lib/*.jar. Runs anywhere a
  # JDK 25+ does (Windows, other arches), trading native instant-start for portability.
  jvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'
      - name: Build JVM distribution
        run: ./gradlew distZip --no-daemon
      - name: Stage distribution
        run: cp build/distributions/*.zip jcma-jvm.zip
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" jcma-jvm.zip --clobber

  # Publish SHA256SUMS over all assets so the plugin bootstrap can verify downloads before
  # exec'ing them. Runs after the asset producers so every file is on the release.
  checksums:
    needs: [native, jvm]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern 'jcma-*.tar.gz' --pattern 'jcma-jvm.zip'
      - name: Compute checksums
        run: sha256sum jcma-*.tar.gz jcma-jvm.zip > SHA256SUMS
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" SHA256SUMS --clobber
