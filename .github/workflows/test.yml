name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # build.gradle.kts pins the toolchain to the GraalVM vendor for compile + test
      # (not just nativeCompile), so the test job needs GraalVM 25, not plain Temurin.
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'

      - run: ./gradlew test --no-daemon
